# Docker / Podman Compose deployment (alternative to systemd units)
# Usage: docker compose up -d  OR  podman-compose up -d

services:
  app:
    build: ..
    ports:
      - "4000:3000"
    volumes:
      - tipsplit-data:/app/data
    env_file:
      - ../.env
    restart: unless-stopped

volumes:
  tipsplit-data:
